name: Post evaluation results

# Companion to "Evaluate challenge submission". The evaluation run for a fork PR
# has a read-only token and cannot comment on the PR. This workflow runs AFTER it
# with write access, but it never checks out or executes PR code -- it only
# downloads the artifact the evaluation produced and posts the SUMMARY as a PR
# comment. That is the secure way to give fork PRs visible results.

on:
  workflow_run:
    workflows: ["Evaluate challenge submission"]
    types: [completed]

permissions:
  pull-requests: write
  actions: read

jobs:
  comment:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Download the results artifact
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: cq4oe-results
          path: artifact

      - name: Post or update the PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let pr, summary;
            try {
              pr = Number(fs.readFileSync('artifact/result_meta/pr_number.txt', 'utf8').trim());
              summary = fs.readFileSync('artifact/result_meta/SUMMARY.md', 'utf8');
            } catch (e) {
              core.setFailed('Could not read result metadata from artifact: ' + e.message);
              return;
            }
            const marker = '<!-- cq4oe-eval -->';
            const body = `${marker}\n${summary}\n\n_Posted automatically by the CQ4OE evaluation workflow. Full results are attached as the \`cq4oe-results\` artifact on the run._`;

            // upsert: update our previous comment if present, else create one
            const { owner, repo } = context.repo;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number: pr });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: pr, body });
            }
