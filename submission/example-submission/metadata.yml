organization_id: "OEG-UPM"                      
method_name: "CQbyCQ"
base_model: "deepseek-v4-pro"


method_description: >
  Generate the ontology one competency question at a time. For each CQ the model
  is prompted to emit the classes, properties, and axioms needed to answer that
  CQ; the per-CQ fragments are merged into a single OWL ontology per domain. For
  the CQ2Term task the same model predicts the explicit classes and properties
  required by each CQ.

tasks:
  - cq2onto
  - cq2term
domains:
  - awo
  - odrl
  - swo
  - vgo
  - water
  - wine

code:
  available: true
  entry_point: "code/run.py"
  language: "Python 3.10"
  environment_setup: |
    python -m venv .venv && source .venv/bin/activate
    pip install -r code/requirements.txt
  secrets_required:
    - "OPENROUTER_API_KEY"
  run_command: |
    python code/run.py --tasks cq2onto,cq2term --domains all --out .
  expected_outputs: |
    CQ2Onto/<domain>/<domain>_ontology.owl
    CQ2Term/<domain>/<domain>_cq2terms_terms.json
