# CQ4OE Leaderboard provenance.
#
# Two badges per (mode, model) for CQ2Onto, per model for CQ2Term.
# A run with no entry here is treated as a community submission (no badge).
#
#   reproduced  - a maintainer invoked the model and obtained the prediction.
#   verified    - a maintainer checked/corrected the alignment before metrics ran.
#
# Ranking: only runs with BOTH badges are ranked; others sit below, unranked.
# verified.datasets lists the domains a maintainer verified; the overall row is
# ranked only when every aggregated domain is verified.
#
# This file was generated from the runs present in 03_evaluation_results/
# (all existing runs are maintainer-produced -> reproduced + verified on all
# domains they cover). Edit by hand as new runs are added or verified.

