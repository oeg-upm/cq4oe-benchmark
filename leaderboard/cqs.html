<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CQ4OE Benchmark — Competency Questions</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 0;
    padding: 24px 32px 48px;
    color: #1a1a1a;
    background: #fafafa;
  }
  h1 { margin: 0 0 4px; font-size: 26px; }
  h2 { font-size: 17px; margin: 20px 0 6px; color: #333; }

  .topbar-mini {
    display: flex; gap: 16px; align-items: center;
    font-size: 14px;
    margin-bottom: 18px;
  }
  .topbar-mini a {
    text-decoration: none; color: #555;
  }
  .topbar-mini a:hover { color: #1a1a1a; }

  /* Dataset selector */
  .ds-nav {
    display: flex; gap: 8px; align-items: center;
    margin: 14px 0 6px;
    flex-wrap: wrap;
    font-size: 14px;
  }
  .ds-btn {
    background: #fff; color: #444;
    border: 1px solid #d8d8d8; border-radius: 5px;
    padding: 6px 14px; cursor: pointer;
    font-size: 13px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .ds-btn:hover { background: #f5f5f5; }
  .ds-btn.active {
    background: #1a73e8; color: #fff; border-color: #1a73e8;
  }

  /* Task tabs */
  .task-tabs {
    display: flex; gap: 0;
    margin: 18px 0 0;
    border-bottom: 2px solid #e0e0e0;
  }
  .task-tab {
    background: transparent; border: none;
    padding: 10px 18px;
    font-size: 14px; color: #666; cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
  }
  .task-tab:hover { color: #333; }
  .task-tab.active {
    color: #1a73e8;
    border-bottom-color: #1a73e8;
    font-weight: 600;
  }

  .task-meta {
    color: #666; font-size: 13px;
    margin: 12px 0 4px;
  }

  /* CQ table */
  table {
    width: 100%; border-collapse: collapse; font-size: 14px;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    overflow: hidden;
    margin-top: 8px;
  }
  thead { background: #f5f5f5; }
  th, td {
    padding: 10px 14px; text-align: left;
    border-bottom: 1px solid #eee;
    vertical-align: top;
  }
  th { color: #444; font-weight: 600; font-size: 13px; }
  td.cq-id {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: #888; width: 50px;
    text-align: right;
    white-space: nowrap;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #fafbfc; }

  .empty {
    text-align: center;
    color: #888;
    padding: 24px;
    font-style: italic;
  }

  .source-links {
    display: flex; flex-wrap: wrap; gap: 20px;
    margin-top: 12px;
  }
  .source-link {
    display: inline-block;
    font-size: 13px;
    color: #1a73e8;
    text-decoration: none;
  }
  .source-link:hover { text-decoration: underline; }

  @media (max-width: 720px) {
    body { padding: 16px; }
    th, td { padding: 8px 10px; }
  }
</style>
</head>
<body>

<div class="topbar-mini">
  <a href="index.html">← Home</a>
  <a href="leaderboard.html">Leaderboard</a>
</div>

<h1>Competency Questions</h1>
<p style="color:#555;font-size:14px;margin:6px 0 22px;max-width:780px;">
  Each source ontology in CQ4OE comes with a set of competency questions used to evaluate generated ontologies.
  CQ2Term measures CQ-specific term prediction over 99 CQs; CQ2Onto measures full ontology generation over 118 CQs.
</p>

<div class="ds-nav">
  <span style="color:#666;margin-right:6px;">Dataset:</span>
  <button class="ds-btn" data-ds="wine">Wine</button>
  <button class="ds-btn" data-ds="awo">AWO</button>
  <button class="ds-btn" data-ds="odrl">ODRL</button>
  <button class="ds-btn" data-ds="water">Water</button>
  <button class="ds-btn" data-ds="vgo">VGO</button>
  <button class="ds-btn" data-ds="swo">SWO</button>
</div>

<div class="task-tabs">
  <button class="task-tab" data-task="cq2term">CQ2Term CQs</button>
  <button class="task-tab" data-task="cq2onto">CQ2Onto CQs</button>
</div>

<div id="content">
  <div class="task-meta" id="task-meta"></div>
  <table id="cq-table">
    <thead>
      <tr><th>ID</th><th>Competency Question</th></tr>
    </thead>
    <tbody id="cq-tbody"></tbody>
  </table>
  <div class="source-links">
    <a id="aligned-link" class="source-link" href="#" target="_blank" rel="noopener"></a>
    <a id="source-link" class="source-link" href="#" target="_blank" rel="noopener"></a>
  </div>
</div>

<script src="cqs_data.js"></script>
<script>
const DATASET_LABELS = {
  wine:  { name: "Wine",  desc: "Wine Ontology",                aligned: "https://github.com/oeg-upm/cq4oe-benchmark/blob/main/CQ2Onto/00_gold_standard/wine/ontology/sub_wine.owl", source: "https://github.com/UCDavisLibrary/wine-ontology" },
  awo:   { name: "AWO",   desc: "African Wildlife Ontology",    aligned: "https://github.com/oeg-upm/cq4oe-benchmark/tree/main/CQ2Onto/00_gold_standard/awo/ontology", source: "https://people.cs.uct.ac.za/~mkeet/OEbook/ontologies/AfricanWildlifeOntology1.owl" },
  odrl:  { name: "ODRL",  desc: "Open Digital Rights Language", aligned: "https://github.com/oeg-upm/cq4oe-benchmark/blob/main/CQ2Onto/00_gold_standard/odrl/ontology/sub_odrl.owl", source: "https://www.w3.org/ns/odrl/2/" },
  water: { name: "Water", desc: "SAREF4WATR Ontology",          aligned: "https://github.com/oeg-upm/cq4oe-benchmark/blob/main/CQ2Onto/00_gold_standard/water/ontology/sub_water.owl", source: "https://saref.etsi.org/saref4watr/v1.1.1/" },
  vgo:   { name: "VGO",   desc: "Video Game Ontology",          aligned: "https://github.com/oeg-upm/cq4oe-benchmark/blob/main/CQ2Onto/00_gold_standard/vgo/ontology/sub_vgo.owl", source: "https://vocab.linkeddata.es/vgo/" },
  swo:   { name: "SWO",   desc: "Software Ontology",            aligned: "https://github.com/oeg-upm/cq4oe-benchmark/blob/main/CQ2Onto/00_gold_standard/swo/ontology/sub_swo.owl", source: "https://obofoundry.org/ontology/swo.html" },
};

const state = { ds: "wine", task: "cq2term" };

function parseHash() {
  // #wine, #wine/cq2onto, etc.
  const h = window.location.hash.replace(/^#/, "");
  if (!h) return;
  const parts = h.split("/");
  if (parts[0] && DATASET_LABELS[parts[0]]) {
    state.ds = parts[0];
  }
  if (parts[1] === "cq2term" || parts[1] === "cq2onto") {
    state.task = parts[1];
  }
}

function updateHash() {
  const newHash = `#${state.ds}/${state.task}`;
  if (window.location.hash !== newHash) {
    history.replaceState(null, "", newHash);
  }
}

function render() {
  // Update dataset buttons
  document.querySelectorAll(".ds-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.ds === state.ds);
  });
  // Update task tabs
  document.querySelectorAll(".task-tab").forEach(b => {
    b.classList.toggle("active", b.dataset.task === state.task);
  });

  const dsInfo = DATASET_LABELS[state.ds];
  const cqs = (CQS_DATA[state.ds] || {})[state.task] || [];

  // Meta line
  const taskLabel = state.task === "cq2term" ? "CQ2Term" : "CQ2Onto";
  document.getElementById("task-meta").textContent =
    `${dsInfo.name} ${dsInfo.desc ? "(" + dsInfo.desc + ")" : ""} — ${taskLabel}: ${cqs.length} CQ${cqs.length === 1 ? "" : "s"}`;

  // Table body
  const tbody = document.getElementById("cq-tbody");
  tbody.innerHTML = "";
  if (cqs.length === 0) {
    const tr = document.createElement("tr");
    const td = document.createElement("td");
    td.colSpan = 2;
    td.className = "empty";
    td.textContent = "No competency questions for this combination.";
    tr.appendChild(td);
    tbody.appendChild(tr);
  } else {
    cqs.forEach((cq, idx) => {
      const tr = document.createElement("tr");
      const idTd = document.createElement("td");
      idTd.className = "cq-id";
      idTd.textContent = idx + 1;
      const qTd = document.createElement("td");
      qTd.textContent = cq.value || cq.question || "";
      tr.appendChild(idTd);
      tr.appendChild(qTd);
      tbody.appendChild(tr);
    });
  }

  // Footer links → CQ-aligned (gold standard) + external source ontology
  const al = document.getElementById("aligned-link");
  al.href = dsInfo.aligned;
  al.textContent = `CQ-aligned ontology (gold standard) ↗`;

  const sl = document.getElementById("source-link");
  sl.href = dsInfo.source;
  sl.textContent = `Source ontology ↗`;

  updateHash();
}

document.querySelectorAll(".ds-btn").forEach(b => {
  b.addEventListener("click", () => {
    state.ds = b.dataset.ds;
    render();
  });
});
document.querySelectorAll(".task-tab").forEach(b => {
  b.addEventListener("click", () => {
    state.task = b.dataset.task;
    render();
  });
});

window.addEventListener("hashchange", () => {
  parseHash();
  render();
});

parseHash();
render();
</script>

</body>
</html>
