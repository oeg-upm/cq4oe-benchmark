organization_id: "OEG-UPM"                      
method_name: "CQbyCQ"
base_model: "deepseek-v4-pro"


method_description: >
  Generate the ontology one competency question at a time. For each CQ the model
  is prompted to emit the classes, properties, and axioms needed to answer that
  CQ; the per-CQ fragments are merged into a single OWL ontology per domain. For
  the CQ2Term task the same model predicts the explicit classes and properties
  required by each CQ.

tasks:
  - cq2onto
  - cq2term
domains:
  - awo
  - odrl
  - swo
  - vgo
  - water
  - wine
reproducibility:
  type: "source code" # please select one from ["source code", "api", "none"]
  entry_point: https://github.com/xxx/xxx # here please provide the link to source code or api 
